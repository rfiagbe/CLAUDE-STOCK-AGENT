name: Morning picks email

on:
  schedule:
    # 12:00 UTC = 8:00 AM EDT (summer) / 7:00 AM EST (winter), Mon-Fri
    - cron: "0 12 * * 1-5"
  workflow_dispatch: {}   # "Run workflow" button — trigger anytime from the GitHub app

permissions:
  contents: write

concurrency:
  group: stock-agent
  cancel-in-progress: false

jobs:
  picks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run screen and send picks email
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python stock_agent.py

      - name: Commit updated data and dashboard
        run: |
          git config user.name "stock-agent"
          git config user.email "actions@users.noreply.github.com"
          git add picks_history.csv benchmark_history.csv dashboard.html
          git diff --cached --quiet || git commit -m "Morning picks $(date -u +%F)"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push
