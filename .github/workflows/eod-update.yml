name: End-of-day update

on:
  schedule:
    # 22:00 UTC = 6:00 PM EDT (summer) / 5:00 PM EST (winter), Mon-Fri
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {}   # "Run workflow" button — trigger anytime from the GitHub app

permissions:
  contents: write

concurrency:
  group: stock-agent
  cancel-in-progress: false

jobs:
  eod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Update closes, dashboard, and send confirmation email
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python eod_update.py

      - name: Commit updated data and dashboard
        run: |
          git config user.name "stock-agent"
          git config user.email "actions@users.noreply.github.com"
          git add picks_history.csv benchmark_history.csv dashboard.html
          git diff --cached --quiet || git commit -m "EOD update $(date -u +%F)"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push
